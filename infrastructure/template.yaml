AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Alexa skill bridge hacia el agente OpenClaw mauro

Parameters:
  OpenClawGatewayUrl:
    Type: String
    Description: URL base del Gateway OpenClaw (ej. https://openclaw.example.com)
  OpenClawGatewayToken:
    Type: String
    NoEcho: true
    Description: Token de autenticación del Gateway OpenClaw
  OpenClawAgentId:
    Type: String
    Default: mauro
    Description: ID del agente OpenClaw destino
  AlexaSkillId:
    Type: String
    Default: ''
    Description: ID de la skill en Alexa Developer Console (vacío = registrar ARN manualmente primero)

Conditions:
  HasAlexaSkillId: !Not [!Equals [!Ref AlexaSkillId, '']]

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    MemorySize: 256

Resources:
  CareAlexaSkillFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambda/
      Handler: index.handler
      Description: Puente Alexa -> OpenClaw agente mauro
      Environment:
        Variables:
          OPENCLAW_GATEWAY_URL: !Ref OpenClawGatewayUrl
          OPENCLAW_GATEWAY_TOKEN: !Ref OpenClawGatewayToken
          OPENCLAW_AGENT_ID: !Ref OpenClawAgentId
          ALEXA_SKILL_ID: !Ref AlexaSkillId

  CareAlexaSkillPermission:
    Type: AWS::Lambda::Permission
    Condition: HasAlexaSkillId
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CareAlexaSkillFunction
      EventSourceToken: !Ref AlexaSkillId
      Principal: alexa-appkit.amazon.com

Outputs:
  LambdaArn:
    Description: ARN de la función Lambda para registrar en Alexa Developer Console
    Value: !GetAtt CareAlexaSkillFunction.Arn
  LambdaName:
    Description: Nombre de la función Lambda
    Value: !Ref CareAlexaSkillFunction
